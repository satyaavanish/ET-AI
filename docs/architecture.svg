<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Sans, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4A7A9E"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E5484D"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#0A0F14"/>

  <text x="30" y="36" fill="#6FA6CC" font-size="20" font-weight="600" letter-spacing="0.5">ZH-1 — Compound Risk &amp; Zero-Harm Platform — System Architecture</text>

  <!-- LAYER 1: Sources -->
  <text x="30" y="80" fill="#7C8DA1" font-size="12" letter-spacing="1">LAYER 1 — PLANT DATA SOURCES</text>
  <g font-size="12" fill="#DCE6EE">
    <g transform="translate(30,95)">
      <rect width="150" height="54" rx="4" fill="#111922" stroke="#223140"/>
      <text x="12" y="22">IoT Gas Sensors</text><text x="12" y="38" fill="#7C8DA1" font-size="10">CO / H2S / CH4</text>
    </g>
    <g transform="translate(200,95)">
      <rect width="150" height="54" rx="4" fill="#111922" stroke="#223140"/>
      <text x="12" y="22">SCADA / OPC-UA</text><text x="12" y="38" fill="#7C8DA1" font-size="10">Process telemetry</text>
    </g>
    <g transform="translate(370,95)">
      <rect width="150" height="54" rx="4" fill="#111922" stroke="#223140"/>
      <text x="12" y="22">Permit-to-Work</text><text x="12" y="38" fill="#7C8DA1" font-size="10">Hot work / confined space</text>
    </g>
    <g transform="translate(540,95)">
      <rect width="150" height="54" rx="4" fill="#111922" stroke="#223140"/>
      <text x="12" y="22">CCTV Feeds</text><text x="12" y="38" fill="#7C8DA1" font-size="10">Zone occupancy / PPE</text>
    </g>
    <g transform="translate(710,95)">
      <rect width="150" height="54" rx="4" fill="#111922" stroke="#223140"/>
      <text x="12" y="22">Shift &amp; Roster Logs</text><text x="12" y="38" fill="#7C8DA1" font-size="10">Changeover windows</text>
    </g>
    <g transform="translate(880,95)">
      <rect width="150" height="54" rx="4" fill="#111922" stroke="#223140"/>
      <text x="12" y="22">Maintenance / CMMS</text><text x="12" y="38" fill="#7C8DA1" font-size="10">Active work orders</text>
    </g>
    <g transform="translate(1050,95)">
      <rect width="120" height="54" rx="4" fill="#111922" stroke="#223140"/>
      <text x="10" y="22">Incident &amp;</text><text x="10" y="38">Regulatory Corpus</text>
    </g>
  </g>

  <!-- arrows down to ingestion -->
  <g stroke="#4A7A9E" stroke-width="1.4" marker-end="url(#arrow)" fill="none">
    <path d="M105,149 L105,190"/>
    <path d="M275,149 L275,190"/>
    <path d="M445,149 L445,190"/>
    <path d="M615,149 L615,190"/>
    <path d="M785,149 L785,190"/>
    <path d="M955,149 L955,190"/>
    <path d="M1110,149 L1110,190"/>
  </g>

  <!-- LAYER 2: Ingestion / normalization -->
  <text x="30" y="205" fill="#7C8DA1" font-size="12" letter-spacing="1">LAYER 2 — INGESTION &amp; NORMALISATION</text>
  <rect x="30" y="215" width="1140" height="50" rx="4" fill="#16212C" stroke="#223140"/>
  <text x="50" y="245" fill="#DCE6EE" font-size="13">Stream/batch adapters → common event schema (zone_id, timestamp, type, payload) → time-aligned per-zone frame</text>

  <path d="M600,265 L600,300" stroke="#4A7A9E" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>

  <!-- LAYER 3: Multi-agent intelligence -->
  <text x="30" y="320" fill="#7C8DA1" font-size="12" letter-spacing="1">LAYER 3 — MULTI-AGENT INTELLIGENCE CORE</text>

  <g font-size="12" fill="#DCE6EE">
    <g transform="translate(30,335)">
      <rect width="270" height="90" rx="5" fill="#111922" stroke="#6FA6CC" stroke-width="1.3"/>
      <text x="14" y="24" font-weight="600" fill="#6FA6CC">Compound Risk Detection Engine</text>
      <text x="14" y="44" fill="#7C8DA1" font-size="10.5">Fuses sensor + permit + maintenance</text>
      <text x="14" y="58" fill="#7C8DA1" font-size="10.5">+ shift + occupancy signals per zone</text>
      <text x="14" y="76" fill="#7C8DA1" font-size="10.5">→ weighted compound score, per-factor trace</text>
    </g>
    <g transform="translate(320,335)">
      <rect width="270" height="90" rx="5" fill="#111922" stroke="#223140"/>
      <text x="14" y="24" font-weight="600" fill="#DCE6EE">Digital Permit Intelligence Agent</text>
      <text x="14" y="44" fill="#7C8DA1" font-size="10.5">Cross-checks concurrent permits</text>
      <text x="14" y="58" fill="#7C8DA1" font-size="10.5">against live hazard state</text>
    </g>
    <g transform="translate(610,335)">
      <rect width="270" height="90" rx="5" fill="#111922" stroke="#223140"/>
      <text x="14" y="24" font-weight="600" fill="#DCE6EE">Incident Pattern Retrieval</text>
      <text x="14" y="44" fill="#7C8DA1" font-size="10.5">TF-IDF retrieval over near-miss +</text>
      <text x="14" y="58" fill="#7C8DA1" font-size="10.5">incident + paraphrased reference corpus</text>
    </g>
    <g transform="translate(900,335)">
      <rect width="270" height="90" rx="5" fill="#111922" stroke="#223140"/>
      <text x="14" y="24" font-weight="600" fill="#DCE6EE">Quality &amp; Compliance Audit Agent</text>
      <text x="14" y="44" fill="#7C8DA1" font-size="10.5">Continuous clause-vs-state check</text>
      <text x="14" y="58" fill="#7C8DA1" font-size="10.5">→ compliance gap list</text>
    </g>
  </g>

  <path d="M165,425 L165,460" stroke="#4A7A9E" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>
  <path d="M600,425 Q600,460 400,460" stroke="#4A7A9E" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>

  <!-- LAYER 4: Orchestration -->
  <text x="30" y="490" fill="#7C8DA1" font-size="12" letter-spacing="1">LAYER 4 — RESPONSE ORCHESTRATION</text>
  <g transform="translate(30,500)">
    <rect width="450" height="90" rx="5" fill="#111922" stroke="#E5484D" stroke-width="1.3"/>
    <text x="14" y="24" font-weight="600" fill="#E5484D">Emergency Response Orchestrator</text>
    <text x="14" y="44" fill="#7C8DA1" font-size="10.5">On critical trigger: evacuation signal → team paging →</text>
    <text x="14" y="58" fill="#7C8DA1" font-size="10.5">evidence lock → preliminary regulatory incident report</text>
    <text x="14" y="74" fill="#7C8DA1" font-size="10.5">Full auditable action timeline, per incident_id</text>
  </g>

  <path d="M255,590 L255,625" stroke="#E5484D" stroke-width="1.6" marker-end="url(#arrowRed)" fill="none"/>

  <!-- LAYER 5: Interfaces -->
  <text x="30" y="655" fill="#7C8DA1" font-size="12" letter-spacing="1">LAYER 5 — INTERFACES</text>
  <g font-size="12" fill="#DCE6EE">
    <g transform="translate(30,665)">
      <rect width="220" height="60" rx="4" fill="#16212C" stroke="#223140"/>
      <text x="14" y="26">Safety Officer Console</text>
      <text x="14" y="44" fill="#7C8DA1" font-size="10.5">Geospatial heatmap + risk feed</text>
    </g>
    <g transform="translate(270,665)">
      <rect width="220" height="60" rx="4" fill="#16212C" stroke="#223140"/>
      <text x="14" y="26">Emergency Comms Channels</text>
      <text x="14" y="44" fill="#7C8DA1" font-size="10.5">Radio / SMS / control room</text>
    </g>
    <g transform="translate(510,665)">
      <rect width="220" height="60" rx="4" fill="#16212C" stroke="#223140"/>
      <text x="14" y="26">Compliance / Audit Export</text>
      <text x="14" y="44" fill="#7C8DA1" font-size="10.5">OISD / DGMS-ready reports</text>
    </g>
  </g>

  <text x="30" y="748" fill="#4E5F72" font-size="10.5">API layer: FastAPI (backend/app.py) · Client: vanilla HTML/CSS/JS console polling /api/state every 2.5s</text>
</svg>
